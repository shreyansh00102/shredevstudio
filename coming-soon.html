<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shre Dev Studio — Coming Soon. Stay tuned for our new digital solutions platform.">
  <title>Shre Dev Studio — Coming Soon</title>

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Load Playball for cursive, and Inter for modern system text -->
  <link href="https://fonts.googleapis.com/css2?family=Playball&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* Design System foundations */
    :root {
      --color-bg-overlay: rgba(10, 15, 12, 0.75); /* Dark forest overlay */
      --color-text-primary: #ffffff;
      --color-accent: #52b788; /* Soft green accent */
      --font-cursive: 'Playball', 'Great Vibes', cursive;
      --font-sans: 'Inter', sans-serif;
    }

    /* Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #050a07;
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Background layouts */
    .bg-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background-image: url('assets/images/coming-soon-bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.05); /* Slight zoom for parallax/ken-burns feel */
      animation: subtlePan 30s ease-in-out infinite alternate;
    }

    /* Dark green tinted overlay to match image aesthetics & ensure readability */
    .bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background: radial-gradient(
        circle,
        rgba(4, 12, 8, 0.6) 0%,
        rgba(2, 6, 4, 0.85) 100%
      );
    }

    /* Center layout elements */
    .content-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 90%;
      animation: fadeInUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Cursive Heading */
    .coming-soon-title {
      font-family: var(--font-cursive);
      font-size: clamp(4rem, 10vw, 8.5rem);
      font-weight: 400;
      color: var(--color-text-primary);
      line-height: 1.2;
      margin-bottom: 2rem;
      user-select: none;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      letter-spacing: 1px;
    }

    /* Play Button styling matching the screenshot */
    .play-button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 0.5rem;
      gap: 14px;
    }

    .play-video-label {
      font-family: var(--font-sans);
      font-size: 0.82rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.65);
      transition: color 0.3s, opacity 0.3s, transform 0.3s;
      pointer-events: none;
      user-select: none;
    }

    /* Highlight label on hover of the button */
    .play-btn:hover ~ .play-video-label {
      color: #ffffff;
      opacity: 1;
      transform: translateY(2px);
    }

    .play-btn {
      width: 68px;
      height: 68px;
      background-color: #ffffff;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  box-shadow 0.4s ease;
      animation: pulseGlow 2.5s infinite;
      outline: none;
    }

    /* Play Button SVG triangle */
    .play-btn svg {
      width: 20px;
      height: 20px;
      fill: #0d1e15;
      margin-left: 3px; /* Slightly offset to visually center triangle */
      transition: transform 0.4s ease, fill 0.3s ease;
    }

    .play-btn:hover {
      transform: scale(1.12);
      background-color: #ffffff;
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.5);
    }

    .play-btn:active {
      transform: scale(0.96);
    }

    .play-btn:hover svg {
      transform: scale(1.1) rotate(5deg);
      fill: #1b4332;
    }

    /* Focus styling for accessibility */
    .play-btn:focus-visible {
      outline: 3px solid var(--color-accent);
      outline-offset: 4px;
    }

    /* Premium Logo Badge at top left (subtle) */
    .brand-logo {
      position: absolute;
      top: 30px;
      left: 40px;
      z-index: 10;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
      transition: opacity 0.3s;
    }
    
    .brand-logo:hover {
      opacity: 1;
    }

    .brand-logo svg {
      width: 18px;
      height: 18px;
    }

    /* Video modal overlay style */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 100;
      background-color: rgba(3, 8, 5, 0.95);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-container {
      width: 90%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      background-color: #000000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      transform: scale(0.92);
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-overlay.active .modal-container {
      transform: scale(1);
    }

    .video-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .close-btn {
      position: absolute;
      top: 30px;
      right: 40px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 50%;
      opacity: 0.8;
      transition: opacity 0.3s, transform 0.3s, background-color 0.3s;
      z-index: 110;
    }

    .close-btn:hover {
      opacity: 1;
      background-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.1) rotate(90deg);
    }

    .close-btn svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
    }

    /* Screen Reader Text */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Custom animations definition */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseGlow {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.45);
      }
      70% {
        box-shadow: 0 0 0 18px rgba(255, 255, 255, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    @keyframes subtlePan {
      0% {
        transform: scale(1.05) translate(0, 0);
      }
      100% {
        transform: scale(1.08) translate(-10px, -5px);
      }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .coming-soon-title {
        margin-bottom: 1.5rem;
      }
      .play-btn {
        width: 60px;
        height: 60px;
      }
      .play-btn svg {
        width: 18px;
        height: 18px;
      }
      .brand-logo {
        top: 20px;
        left: 20px;
      }
      .close-btn {
        top: 20px;
        right: 20px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Leaves -->
  <div class="bg-container"></div>
  <div class="bg-overlay"></div>

  <!-- Subtle Logo Header -->
  <a href="index.html" class="brand-logo" title="Back to main page">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M30 25 L15 50 L30 75 M70 25 L85 50 L70 75 M45 75 L55 25" />
    </svg>
    <span>Shre Dev Studio</span>
  </a>

  <!-- Main Content Center -->
  <main class="content-wrapper">
    <h1 class="coming-soon-title">Coming Soon</h1>
    <div class="play-button-container">
      <button class="play-btn" id="openVideoBtn" aria-label="Play video preview">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
      </button>
      <span class="play-video-label">Play Video</span>
    </div>
  </main>

  <!-- Video Modal Overlay -->
  <div class="modal-overlay" id="videoModal" role="dialog" aria-modal="true" aria-label="Video player">
    <!-- Close Button (outside modal container to avoid overflow:hidden clipping) -->
    <button class="close-btn" id="closeVideoBtn" aria-label="Close video player">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 6L6 18M6 6L18 18" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="modal-container">
      
      <!-- Video Element Container (HTML5 or Iframe placeholder) -->
      <div id="videoContainer" style="width: 100%; height: 100%;">
        <!-- Instantiated dynamically via JS to support multiple formats & prevent background downloading -->
      </div>
    </div>
  </div>

  <script>
    // Video configuration target url
    const VIDEO_CONFIG = {
      // Option A: Raw MP4 link (e.g. from Pexels, AWS, CDN)
      // Example: 'https://player.vimeo.com/external/371433846.sd.mp4?s=236da2f3c0227e339d3ec85cd839b22e11894d0c&profile_id=165&oauth2_token_id=57447761'
      // Option B: YouTube embed code url. Format: 'https://www.youtube.com/embed/VIDEO_ID?autoplay=1'
      // Option C: Vimeo embed code url. Format: 'https://player.vimeo.com/video/VIDEO_ID?autoplay=1'
      
      videoUrl: 'https://player.vimeo.com/external/371433846.sd.mp4?s=236da2f3c0227e339d3ec85cd839b22e11894d0c&profile_id=165&oauth2_token_id=57447761'
    };

    // Elements query selectors
    const openVideoBtn = document.getElementById('openVideoBtn');
    const closeVideoBtn = document.getElementById('closeVideoBtn');
    const videoModal = document.getElementById('videoModal');
    const videoContainer = document.getElementById('videoContainer');

    // Detect video source provider and build iframe/video tag
    function createVideoElement(url) {
      if (!url) return '';
      
      const isYoutube = url.includes('youtube.com') || url.includes('youtu.be');
      const isVimeoUrl = url.includes('vimeo.com') && !url.includes('player.vimeo.com/external');

      if (isYoutube) {
        // Extract YouTube ID if full URL is passed
        let embedUrl = url;
        if (!url.includes('/embed/')) {
          const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
          const match = url.match(regExp);
          if (match && match[2].length === 11) {
            embedUrl = `https://www.youtube.com/embed/${match[2]}?autoplay=1&rel=0&modestbranding=1`;
          }
        }
        return `<iframe class="video-frame" src="${embedUrl}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
      } 
      
      if (isVimeoUrl) {
        let embedUrl = url;
        if (!url.includes('/video/')) {
          const match = url.match(/vimeo\.com\/(\d+)/);
          if (match) {
            embedUrl = `https://player.vimeo.com/video/${match[1]}?autoplay=1`;
          }
        }
        return `<iframe class="video-frame" src="${embedUrl}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
      }

      // Default to HTML5 Video for direct MP4 links
      return `
        <video class="video-frame" controls autoplay playsinline style="object-fit: cover;">
          <source src="${url}" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      `;
    }

    // Modal behaviors
    function openModal() {
      // Inject video HTML to load it on click (saves bandwidth and ensures autoplay works)
      videoContainer.innerHTML = createVideoElement(VIDEO_CONFIG.videoUrl);
      videoModal.classList.add('active');
      document.body.style.overflow = 'hidden'; // Lock background scroll
      
      // Auto-focus close button for accessibility
      setTimeout(() => {
        closeVideoBtn.focus();
      }, 100);
    }

    // Close overlay state resets
    function closeModal() {
      videoModal.classList.remove('active');
      document.body.style.overflow = ''; // Restore scroll
      
      // Clear innerHTML to stop playing video immediately when closed
      setTimeout(() => {
        videoContainer.innerHTML = '';
      }, 500); // Wait for transition fade-out to finish
      
      // Focus back to play button
      openVideoBtn.focus();
    }

    // Bind interaction event listeners
    openVideoBtn.addEventListener('click', openModal);
    closeVideoBtn.addEventListener('click', closeModal);

    // Close on overlay background click
    videoModal.addEventListener('click', (e) => {
      if (e.target === videoModal) {
        closeModal();
      }
    });

    // Close on ESC key press
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && videoModal.classList.contains('active')) {
        closeModal();
      }
    });
  </script>
</body>
</html>
